<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - Travela</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <img class="one" src="Group.png" alt="" />
  <main>
    <section class="first">
      <div class="logo">
        <img src="flight-ticket.png " alt="" />Travela&trade;
      </div>
      <div class="nav">
        <a href="main.html"><p>Home</p></a>
        <a href="Services.html"><p>Services</p></a>
        <a href="about_us.html"><p>About Us</p></a>
        <a href="Contact_us.html"><p>Contact Us</p></a>
      </div>
      <div class="login" id="auth-section">
        <!-- This will be populated by JavaScript -->
      </div>
    </section>
    
    <div class="box">
      <h2 class="text-2xl font-bold text-center mb-6">My Bookings</h2>
      
      <div id="bookings-container" class="p-6 bg-white rounded-lg shadow-md">
        <div id="loading" class="text-center py-4">
          <p>Loading your bookings...</p>
        </div>
        
        <div id="bookings-list" class="space-y-4 hidden">
          <!-- Bookings will be inserted here by JavaScript -->
        </div>
        
        <div id="no-bookings" class="text-center py-4 hidden">
          <p class="text-lg text-gray-600">You don't have any bookings yet.</p>
          <a href="main.html" class="inline-block mt-4 bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-lg">
            Book a Flight
          </a>
        </div>
      </div>
    </div>
  </main>
  
  <footer>
    <!-- Footer content (same as other pages) -->
  </footer>

  <script src="my-bookings.js"></script>
</body>
</html>
