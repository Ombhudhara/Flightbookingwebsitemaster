<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmation - Travela</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <img class="one" src="Group.png" alt="" />
  <main>
    <section class="first">
      <div class="logo">
        <img src="flight-ticket.png " alt="" />Travela&trade;
      </div>
      <div class="nav">
        <a href="main.html"><p>Home</p></a>
        <a href="Services.html"><p>Services</p></a>
        <a href="about_us.html"><p>About Us</p></a>
        <a href="Contact_us.html"><p>Contact Us</p></a>
      </div>
      <div class="login" id="auth-section">
        <!-- This will be populated by JavaScript -->
      </div>
    </section>
    
    <div class="box">
      <div id="confirmation-container" class="p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center mb-6">Booking Confirmation</h2>
        <div id="booking-details" class="space-y-4">
          <!-- Booking details will be inserted here by JavaScript -->
        </div>
        <div class="mt-8 flex justify-center">
          <button id="view-all-bookings" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded-lg mr-4">
            View All Bookings
          </button>
          <button id="return-home" class="bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-4 rounded-lg">
            Return to Homepage
          </button>
        </div>
      </div>
    </div>
  </main>
  
  <footer>
    <div class="main">
      <div class="cu">
        <h2>Contact Us</h2>
        <div class="border"></div>
        <p>Email: travela@gmail.com</p>
        <p>Phone: +91 99009 88008</p>
        <p>Address: S.G. Highway, Adalaj Circle, Ahmedabad</p>
      </div>
      <div class="cu">
        <h2>Quick Links</h2>
        <div class="border"></div>
        <p>Services</p>
        <p>About Us</p>
        <p>Contact Us</p>
      </div>
      <div class="cu">

        <div class="border"></div>
        <div class="svg">
          <!-- Social media icons from your main page -->
        </div>

      </div>
    </div>
