<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Airports with Dropdown</title>
    <link rel="stylesheet" href="ex.css" />
</head>
<body>
    <h1>Search Airports</h1>
    <input type="text" id="searchInput" placeholder="Type airport name or city..." onkeyup="searchAirports()">
    <select id="airportDropdown" size="2" onchange="selectAirport()">
        <!-- Options will be populated dynamically -->
    </select>

    <script src="ex.js"></script>
</body>
</html>
